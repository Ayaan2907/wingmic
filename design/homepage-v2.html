// ─────────────────── Living graph background (canvas) ───────────────────
function LiveGraph({ accent, second, third, density = 1 }) {
  const ref = React.useRef(null);
  const accentRef = React.useRef(accent);
  React.useEffect(() => {accentRef.current = accent;}, [accent]);

  React.useEffect(() => {
    const canvas = ref.current;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const resize = () => {
      const w = canvas.clientWidth,h = canvas.clientHeight;
      canvas.width = w * dpr;canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize);ro.observe(canvas);

    const palette = [accent, second, third, '#fff'];
    const N = Math.floor(60 * density);
    const nodes = Array.from({ length: N }, (_, i) => ({
      x: Math.random() * canvas.clientWidth,
      y: Math.random() * canvas.clientHeight,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: 1.5 + Math.random() * 2.5,
      color: palette[i % palette.length],
      pulse: Math.random() * Math.PI * 2
    }));

    let frame;
    const tick = () => {
      const w = canvas.clientWidth,h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      // edges
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = nodes[i],b = nodes[j];
          const d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d > 160) continue;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(255,196,82,${0.07 * (1 - d / 160)})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
      nodes.forEach((n) => {
        n.x += n.vx;n.y += n.vy;n.pulse += 0.02;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
        const pulseAmt = 0.6 + Math.sin(n.pulse) * 0.4;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * pulseAmt, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.globalAlpha = 0.65;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      frame = requestAnimationFrame(tick);
    };
    tick();
    return () => {cancelAnimationFrame(frame);ro.disconnect();};
  }, [density, second, third]);

  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />;
}

// ─────────────────── Voice waveform that reacts ───────────────────
function VoiceBars({ active, accent, count = 22 }) {
  const [phase, setPhase] = React.useState(0);
  React.useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setPhase((p) => p + 1), 80);
    return () => clearInterval(id);
  }, [active]);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, height: 40 }}>
      {Array.from({ length: count }, (_, i) => {
        const seed = (Math.sin(phase * 0.6 + i * 0.7) + Math.cos(phase * 0.3 + i * 1.1)) * 0.5 + 0.5;
        const h = active ? 6 + seed * 32 : 4;
        return <div key={i} style={{
          width: 3, height: h, borderRadius: 2,
          background: active ? accent : 'rgba(255,255,255,0.2)',
          transition: 'height 0.12s ease-out'
        }} />;
      })}
    </div>);

}

function MiniPhone({ accent }) {

        {/* Mic + waves */}
        <div style={{ position: 'relative', width: 100, height: 100, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {phase === 1 && [0, 1, 2].map((i) =>
          <div key={i} style={{
            position: 'absolute',
            width: 100 + i * 30, height: 100 + i * 30, borderRadius: '50%',
            border: `1.5px solid ${accent}`,
            opacity: 0.4 - i * 0.1,
            animation: `pulse-d ${1.2 + i * 0.4}s ease-in-out infinite`

          <div style={{
            width: 70, height: 70, borderRadius: '50%',

            transition: 'all 0.3s'
          }}>

              <path d="M5 11a7 7 0 0014 0" stroke={phase === 1 ? '#000' : 'rgba(255,255,255,0.5)'} strokeWidth="2" strokeLinecap="round" />
              <path d="M12 18v3" stroke={phase === 1 ? '#000' : 'rgba(255,255,255,0.5)'} strokeWidth="2" strokeLinecap="round" />
            </svg>
          </div>
        </div>

        <VoiceBars active={phase === 1} accent={accent} />

        {/* Transcript bubble */}
        {phase >= 1 &&
        <div style={{
          padding: '10px 12px', borderRadius: 12, fontSize: 12,
          background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)',
          color: 'rgba(255,255,255,0.75)', minHeight: 50, lineHeight: 1.4
        }}>

            <div className="mono" style={{ fontSize: 9, color: accent, letterSpacing: 1, textTransform: 'uppercase' }}>extracted</div>

            <span className="serif" style={{ fontStyle: 'italic', fontWeight: 400, color: accent }}>connections</span>.
          </h2>
          <p style={{ fontSize: 18, color: 'rgba(255,255,255,0.55)', lineHeight: 1.6, marginBottom: 40, maxWidth: 480, marginLeft: 'auto', marginRight: 'auto' }}>
            Get early access to v0.1. We let people in waves of 50. Bring your own Claude key, MIT-licensed when GA.
          </p>

          {!submitted ?
          <form onSubmit={(e) => {e.preventDefault();submitWaitlist();}} style={{
            display: 'flex', gap: 8, padding: 6, borderRadius: 12,
            background: '#0a0a0a', border: `1.5px solid ${accent}50`,
            maxWidth: 500, margin: '0 auto',
            boxShadow: `4px 4px 0 ${accent}30`
          }}>
              <input
              type="email" placeholder="you@dev.shop" value={email}
              onChange={(e) => setEmail(e.target.value)}
              style={{
                flex: 1, padding: '14px 16px', background: 'transparent', border: 'none',
                color: '#fff', fontSize: 15, outline: 'none', fontFamily: 'inherit'
              }} />
            
              <button type="submit" style={{
              padding: '14px 26px', borderRadius: 8, background: accent, color: '#000',
              fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer',
              fontFamily: 'inherit', display: 'inline-flex', alignItems: 'center', gap: 6
            }}>
                Request access
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12m0 0L8 2m5 5l-5 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>
              </button>
            </form> :

          <div style={{
            padding: 24, borderRadius: 12, maxWidth: 500, margin: '0 auto',
            background: `${accent}10`, border: `1px solid ${accent}40`
          }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'center' }}>
                <div style={{ width: 28, height: 28, borderRadius: '50%', background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L11 4" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                </div>
                <div style={{ fontSize: 16, color: '#fff' }}>You're on the list. We'll email you within a week.</div>
              </div>
            </div>
          }

          <div className="mono" style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', marginTop: 24, letterSpacing: 1, textTransform: 'uppercase' }}>
            no spam · unsubscribe in one click · MIT-licensed @ GA
          </div>
        </div>
      </section>

      {/* ─────────────────── FOOTER ─────────────────── */}
      <footer style={{
        padding: '60px 32px 40px', borderTop: '1px solid rgba(255,255,255,0.06)',
        background: '#0a0a0a'
      }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 40, marginBottom: 40 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: accent, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: 18 }}>W</div>
              <span className="mono" style={{ fontSize: 16, fontWeight: 700, color: '#fff' }}>wingmic.xyz</span>
            </div>
            <p style={{ fontSize: 13.5, color: 'rgba(255,255,255,0.4)', lineHeight: 1.6, maxWidth: 320 }}>
              Persistent storage for your social RAM. Voice-first networking memory graph for developers.
            </p>
          </div>
          {[
          { h: 'Product', items: ['Beta', 'API', 'MCP', 'Changelog'] },
          { h: 'Devs', items: ['Docs', 'OpenAPI', 'SDK', 'GitHub'] },
          { h: 'Wingmic', items: ['Manifesto', 'Privacy', 'X / Twitter', 'Status'] }].
          map((col) =>
          <div key={col.h}>
              <div className="mono" style={{ fontSize: 11, color: accent, marginBottom: 12, textTransform: 'uppercase', letterSpacing: 1.5 }}>{col.h}</div>
              {col.items.map((it) =>
            <a key={it} href="#" style={{ display: 'block', fontSize: 13, color: 'rgba(255,255,255,0.6)', padding: '4px 0' }}>{it}</a>
            )}
            </div>
          )}
        </div>
        <div style={{ maxWidth: 1280, margin: '0 auto', paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.06)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
          <div className="mono" style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.3)' }}>
            wingmic.xyz · MIT @ GA · built for devs who hate losing connections
          </div>
          <div className="mono" style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.3)' }}>
            v0.1.0-beta · sf · ⌥ ◆
          </div>
        </div>
      </footer>

      {/* Tweaks panel */}
      {tweaksOpen &&
      <div style={{
        position: 'fixed', bottom: 16, right: 16, width: 280,
        background: '#1a1a24', borderRadius: 16, padding: 20, zIndex: 999,
        border: '1px solid rgba(255,255,255,0.1)', boxShadow: '0 20px 60px rgba(0,0,0,0.5)'
      }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: '#fff', marginBottom: 16 }}>Tweaks</div>
          {[
        { k: 'accentColor', label: 'Primary accent', opts: ['#FFC452', '#FF6B6B', '#7DD3FC', '#A78BFA', '#86efac', '#FF8FAB'] },
        { k: 'secondColor', label: 'Secondary', opts: ['#FF6B6B', '#FFC452', '#7DD3FC', '#A78BFA', '#86efac', '#FF8FAB'] },
        { k: 'thirdColor', label: 'Tertiary', opts: ['#7DD3FC', '#A78BFA', '#86efac', '#FF8FAB', '#FFC452', '#FF6B6B'] }].
        map((field) =>
        <div key={field.k} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>{field.label}</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {field.opts.map((c) =>
            <div key={c} onClick={() => applyTweak(field.k, c)} style={{
              width: 28, height: 28, borderRadius: 8, background: c, cursor: 'pointer',
              border: tweaks[field.k] === c ? '2px solid #fff' : '2px solid transparent'
            }} />
            )}
              </div>
            </div>
        )}
        </div>
      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
