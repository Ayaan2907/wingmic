// ============================ AUDIO ENGINE ============================
// Single AudioContext, lazily created on first user gesture.
const Audio = (() => {
  let ctx = null;
  let masterGain = null;
  let muted = false;
  let unlocked = false;

  function ensure() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.6;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function setMuted(m) {
    muted = m;
    if (masterGain) masterGain.gain.value = m ? 0 : 0.6;
  }
  function setVolume(v) {
    if (masterGain) masterGain.gain.value = muted ? 0 : v;
  }
  function unlock() {
    if (unlocked) return;
    ensure();
    unlocked = true;
    // Warm up speech synth so first utterance isn't laggy
    try {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  // --- One-shot tones ---
  function tone({ freq = 440, dur = 0.2, type = 'sine', gain = 0.3, attack = 0.01, release = 0.1, freqEnd = null, delay = 0 }) {
    const c = ensure(); if (!c || muted) return;
    const now = c.currentTime + delay;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), now + dur);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur + release);
    osc.connect(g); g.connect(masterGain);
    osc.start(now);
    osc.stop(now + dur + release + 0.05);
  }

  function noise({ dur = 0.3, gain = 0.18, filterFreq = 2000, filterQ = 1, sweep = null, delay = 0, type = 'lowpass' }) {
    const c = ensure(); if (!c || muted) return;
    const now = c.currentTime + delay;
    const bufSize = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filt = c.createBiquadFilter();
    filt.type = type;
    filt.frequency.setValueAtTime(filterFreq, now);
    filt.Q.value = filterQ;
    if (sweep != null) filt.frequency.exponentialRampToValueAtTime(Math.max(50, sweep), now + dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start(now);
    src.stop(now + dur + 0.05);
  }

  // --- Sound effects ---
  const SFX = {
    stamp:    () => { tone({ freq: 320, dur: 0.06, type: 'square', gain: 0.18, freqEnd: 180 }); noise({ dur: 0.12, gain: 0.1, filterFreq: 1200, sweep: 400 }); },
    pop:      () => { tone({ freq: 900, dur: 0.08, type: 'sine', gain: 0.18, freqEnd: 1400, attack: 0.005 }); },
    whoosh:   () => { noise({ dur: 0.5, gain: 0.16, filterFreq: 3500, sweep: 200, type: 'bandpass', filterQ: 1.5 }); },
    strike:   () => { tone({ freq: 220, dur: 0.05, type: 'triangle', gain: 0.12, freqEnd: 110 }); noise({ dur: 0.08, gain: 0.08, filterFreq: 800, sweep: 200 }); },
    sad:      () => { tone({ freq: 440, dur: 0.4, type: 'sine', gain: 0.2, freqEnd: 220, release: 0.3 }); },
    chime:    () => {
      [880, 1320, 1760].forEach((f, i) => tone({ freq: f, dur: 0.5, type: 'sine', gain: 0.18, attack: 0.02, release: 0.4, delay: i * 0.06 }));
    },
    aha:      () => {
      [523, 659, 784, 1047].forEach((f, i) => tone({ freq: f, dur: 0.35, type: 'triangle', gain: 0.14, attack: 0.01, release: 0.3, delay: i * 0.07 }));
    },
    keytype:  () => { tone({ freq: 1800 + Math.random() * 600, dur: 0.02, type: 'square', gain: 0.06, release: 0.03 }); },
    click:    () => { tone({ freq: 2400, dur: 0.015, type: 'square', gain: 0.08, release: 0.02 }); },
    nodeAdd:  () => { tone({ freq: 660, dur: 0.08, type: 'sine', gain: 0.12, freqEnd: 990, attack: 0.005, release: 0.08 }); },
    edgeDraw: () => { tone({ freq: 440, dur: 0.06, type: 'triangle', gain: 0.06, freqEnd: 660, release: 0.05 }); },
    success:  () => {
      [523, 784, 1047, 1568].forEach((f, i) => tone({ freq: f, dur: 0.4, type: 'sine', gain: 0.16, attack: 0.01, release: 0.5, delay: i * 0.08 }));
    },
    cta:      () => {
      tone({ freq: 220, dur: 0.15, type: 'sawtooth', gain: 0.16, freqEnd: 440, release: 0.15 });
      [659, 880].forEach((f, i) => tone({ freq: f, dur: 0.3, type: 'triangle', gain: 0.14, attack: 0.01, release: 0.3, delay: 0.15 + i * 0.08 }));
    },
    finalChord: () => {
      [261, 329, 392, 523, 659].forEach((f, i) => tone({ freq: f, dur: 1.4, type: 'sine', gain: 0.12, attack: 0.05, release: 1.2, delay: i * 0.04 }));
    },
  };

  // --- Looping ambient drone (turned on/off by track) ---
  let droneNodes = null;
  function startDrone({ freq = 110, gain = 0.04 }) {
    const c = ensure(); if (!c || droneNodes) return;
    const o1 = c.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
    const o2 = c.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 1.5;
    const o3 = c.createOscillator(); o3.type = 'triangle'; o3.frequency.value = freq * 2;
    const g = c.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(gain, c.currentTime + 1.0);
    o1.connect(g); o2.connect(g); o3.connect(g); g.connect(masterGain);
    o1.start(); o2.start(); o3.start();
    droneNodes = { o1, o2, o3, g };
  }
  function stopDrone() {
    if (!droneNodes) return;
    const c = ensure();
    const { o1, o2, o3, g } = droneNodes;
    g.gain.cancelScheduledValues(c.currentTime);
    g.gain.linearRampToValueAtTime(0, c.currentTime + 0.5);
    setTimeout(() => { try { o1.stop(); o2.stop(); o3.stop(); } catch(e){} }, 600);
    droneNodes = null;
  }

  // --- Voice (SpeechSynthesis) ---
  let voiceCache = null;
  function pickVoice(prefer) {
    if (voiceCache) return voiceCache;
    const voices = window.speechSynthesis.getVoices();
    if (!voices || !voices.length) return null;
    const en = voices.filter(v => v.lang && v.lang.startsWith('en'));
    const list = en.length ? en : voices;
    voiceCache = list.find(v => /samantha|google us|alex|daniel|karen/i.test(v.name)) || list[0];
    return voiceCache;
  }
  function speak({ text, rate = 1.0, pitch = 1.0, volume = 0.9, voiceHint = null }) {
    if (!('speechSynthesis' in window) || muted) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = rate; u.pitch = pitch; u.volume = volume;
      const v = pickVoice(voiceHint);
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }
  function cancelSpeech() {
    try { window.speechSynthesis.cancel(); } catch(e){}
  }

  return { ensure, unlock, setMuted, setVolume, SFX, startDrone, stopDrone, speak, cancelSpeech, isMuted: () => muted };
})();

  { t: 33.0, do: () => Audio.SFX.keytype() },

function useSoundtrack(enabled) {
  const t = useTime();
  const lastTimeRef = React.useRef(-1);
  const firedRef = React.useRef(new Set());
  React.useEffect(() => {
    if (!enabled) return;
    const last = lastTimeRef.current;
    // Detect loop / scrub: if time jumped backward by >0.5s, reset fired set
    if (t < last - 0.5) {
      firedRef.current.clear();
      Audio.cancelSpeech();
      Audio.stopDrone();
    }
    SOUNDTRACK.forEach((cue, i) => {
      if (cue.t <= t && cue.t > last && !firedRef.current.has(i)) {
        firedRef.current.add(i);
        try { cue.do(); } catch(e) { console.warn('sfx error', e); }
      }
    });
    lastTimeRef.current = t;
  }, [t, enabled]);
  // On mount/unmount, ensure audio cleanup on disable
  React.useEffect(() => {
    if (!enabled) {
      Audio.cancelSpeech();
      Audio.stopDrone();
      firedRef.current.clear();
    }
  }, [enabled]);
  return null;
}

const easeOut = Easing.easeOutCubic;
const easeBack = Easing.easeOutBack;
const fadeIn  = (t, s, d=0.5) => animate({ from: 0, to: 1, start: s, end: s+d, ease: easeOut })(t);
const fadeOut = (t, s, d=0.5) => animate({ from: 1, to: 0, start: s, end: s+d, ease: easeOut })(t);
const pop     = (t, s, d=0.6) => animate({ from: 0.6, to: 1, start: s, end: s+d, ease: easeBack })(t);

function Particles({ count = 28, cx = 640, cy = 360, startTime, colors }) {
  const t = useTime();
  const elapsed = t - startTime;
  if (elapsed < 0 || elapsed > 2.5) return null;
  const seeds = React.useMemo(() => Array.from({ length: count }, (_, i) => ({
    angle: (i / count) * Math.PI * 2 + Math.random() * 0.4,
    speed: 90 + Math.random() * 220,
    size: 3 + Math.random() * 5,
    color: colors[i % colors.length],
  })), [count]);
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      {seeds.map((p, i) => {
        const x = cx + Math.cos(p.angle) * p.speed * elapsed * 0.85;
        const y = cy + Math.sin(p.angle) * p.speed * elapsed * 0.85 + elapsed * elapsed * 50;
        const op = Math.max(0, 1 - elapsed / 1.4);
        return <div key={i} style={{ position: 'absolute', left: x, top: y, width: p.size, height: p.size, borderRadius: '50%', background: p.color, opacity: op }} />;
      })}
    </div>
  );
}

function VoiceBars({ active, color, count = 26, height = 36, t }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, height }}>
      {Array.from({ length: count }, (_, i) => {
        const seed = (Math.sin(t * 6 + i * 0.7) + Math.cos(t * 3 + i * 1.1)) * 0.5 + 0.5;
        const h = active ? 5 + seed * (height - 8) : 4;
        return <div key={i} style={{ width: 3, height: h, borderRadius: 2, background: active ? color : 'rgba(255,255,255,0.18)' }} />;
      })}
    </div>
  );
}

// ============================ SCENE 0 — Montage Intro (0–5s) ============================
// Word-stamps + glimpses: hackathons, conferences, dinners, networking
function SceneMontage({ ACCENT, SECOND, THIRD, openingTagline }) {
  const t = useTime();
  if (t > 5.5) return null;
  const sceneOp = t < 0.3 ? fadeIn(t, 0, 0.3) : t > 4.7 ? fadeOut(t, 4.7, 0.5) : 1;

  // Tagline at top
  const tagOp = fadeIn(t, 0.1, 0.4);

  // Big stamps for each event type
  const stamps = [
    { label: 'HACKATHONS',   color: ACCENT, x: 130, y: 200, rot: -6, start: 0.5, scene: 'code' },
    { label: 'CONFERENCES',  color: SECOND, x: 760, y: 130, rot: 4,  start: 1.3, scene: 'mic' },
    { label: 'DINNERS',      color: THIRD,  x: 200, y: 470, rot: 5,  start: 2.1, scene: 'wine' },
    { label: 'MEETUPS',      color: '#7DD3FC', x: 730, y: 430, rot: -3, start: 2.9, scene: 'group' },
    { label: 'NETWORKING',   color: '#A78BFA', x: 420, y: 320, rot: -2, start: 3.5, scene: 'badge' },
  ];

  return (
    <Sprite start={0} end={5}>
      <div style={{ position: 'absolute', inset: 0, background: BG, opacity: sceneOp, overflow: 'hidden' }}>
        {/* Soft warm gradient */}
        <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(ellipse 60% 50% at 50% 50%, ${ACCENT}10 0%, transparent 65%)` }} />

        {/* Faint grid */}
        <div style={{
          position: 'absolute', inset: 0, opacity: 0.5,
          backgroundImage: 'linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px)',
          backgroundSize: '48px 48px',
        }} />

        {/* Tagline */}
        <div style={{ position: 'absolute', top: 60, left: 0, right: 0, textAlign: 'center', opacity: tagOp }}>
          <div style={{ fontFamily: MONO, fontSize: 13, color: 'rgba(255,255,255,0.5)', letterSpacing: 3, textTransform: 'uppercase', marginBottom: 8 }}>
            ◇ Wingmic
          </div>
          <div style={{ fontFamily: SANS, fontSize: 32, fontWeight: 700, color: '#fff', letterSpacing: '-0.02em' }}>
            {openingTagline}
          </div>
        </div>

        {/* Event stamps */}
        {stamps.map((s, i) => {
          const op = fadeIn(t, s.start, 0.3);
          const sc = pop(t, s.start, 0.4);
          const lateFade = animate({ from: 1, to: 0.45, start: s.start + 1.0, end: s.start + 1.6 })(t);
          return (
            <div key={s.label} style={{
              position: 'absolute', left: s.x, top: s.y,
              opacity: op * lateFade, transform: `rotate(${s.rot}deg) scale(${sc})`,
              transformOrigin: 'left center',
            }}>
              {/* Mini glyph card */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 14,
                padding: '14px 22px',
                background: `${s.color}12`, border: `1.5px solid ${s.color}50`,
                borderRadius: 14, boxShadow: `4px 4px 0 rgba(0,0,0,0.4)`,
              }}>
                {/* Glyph */}
                <div style={{
                  width: 44, height: 44, borderRadius: 10,
                  background: s.color, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: '#000',
                }}>
                  {s.scene === 'code' && (
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 18l-6-6 6-6m6 12l6-6-6-6" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  )}
                  {s.scene === 'mic' && (
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" fill="#000"/><path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#000" strokeWidth="2" strokeLinecap="round"/></svg>
                  )}
                  {s.scene === 'wine' && (
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 3h10l-1 8a4 4 0 11-8 0L7 3zm5 13v5m-3 0h6" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>

// ============================ SCENE 5 — Graph (25–31s) ============================
function SceneGraph({ ACCENT, SECOND, THIRD }) {
  const t = useTime() - 25;
  if (t < -0.5 || t > 6.5) return null;
  const sceneOp = t < 0.4 ? fadeIn(t, 0, 0.4) : t > 5.6 ? fadeOut(t, 5.6, 0.4) : 1;
  const labelOp = fadeIn(t, 0.2, 0.4);
  const captionOp = fadeIn(t, 0.4, 0.5);

  const nodes = [
    { id: 'you', label: 'You', cx: 640, cy: 360, r: 26, color: '#fff', type: 'self', delay: 0 },
    { id: 'sarah', label: 'Sarah', cx: 460, cy: 240, r: 18, color: ACCENT, delay: 0.4 },
    { id: 'marcus', label: 'Marcus', cx: 820, cy: 230, r: 18, color: THIRD, delay: 0.7 },
    { id: 'priya', label: 'Priya', cx: 850, cy: 480, r: 18, color: SECOND, delay: 1.0 },
    { id: 'alex', label: 'Alex', cx: 440, cy: 490, r: 18, color: '#7DD3FC', delay: 1.3 },
    { id: 'jordan', label: 'Jordan', cx: 640, cy: 560, r: 18, color: '#A78BFA', delay: 1.6 },
    { id: 'acme', label: 'Acme', cx: 290, cy: 170, r: 12, color: ACCENT, type: 'org', delay: 2.0 },
    { id: 'cf', label: 'Cloudflare', cx: 990, cy: 540, r: 12, color: SECOND, type: 'org', delay: 2.3 },
    { id: 'linear', label: 'Linear', cx: 700, cy: 640, r: 12, color: '#A78BFA', type: 'org', delay: 2.5 },
    { id: 'longrun', label: 'Long Run', cx: 290, cy: 560, r: 12, color: '#7DD3FC', type: 'org', delay: 2.7 },
    { id: 'devcon', label: 'DevConnect', cx: 640, cy: 110, r: 11, color: '#666', type: 'event', delay: 3.0 },
    { id: 'rust', label: '#rust', cx: 280, cy: 320, r: 9, color: '#888', type: 'topic', delay: 3.3 },
    { id: 'edge', label: '#edge_config', cx: 1010, cy: 380, r: 9, color: '#888', type: 'topic', delay: 3.5 },
  ];
  const edges = [
    { from: 'you', to: 'sarah', delay: 0.6 },{ from: 'you', to: 'marcus', delay: 0.9 },
    { from: 'you', to: 'priya', delay: 1.2 },{ from: 'you', to: 'alex', delay: 1.5 },{ from: 'you', to: 'jordan', delay: 1.8 },
    { from: 'sarah', to: 'acme', delay: 2.1 },{ from: 'priya', to: 'cf', delay: 2.4 },
    { from: 'jordan', to: 'linear', delay: 2.6 },{ from: 'alex', to: 'longrun', delay: 2.8 },
    { from: 'sarah', to: 'devcon', delay: 3.1 },{ from: 'marcus', to: 'devcon', delay: 3.2 },
    { from: 'sarah', to: 'rust', delay: 3.4 },{ from: 'priya', to: 'edge', delay: 3.6 },
    { from: 'sarah', to: 'marcus', delay: 3.9 },
  ];
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const drift = (n) => ({ cx: n.cx + Math.sin(t * 0.6 + n.cx * 0.01) * 4, cy: n.cy + Math.cos(t * 0.8 + n.cy * 0.01) * 4 });
  const youPulse = 1 + Math.sin(t * 3) * 0.06;

  return (
    <Sprite start={25} end={31}>
      <div style={{ position: 'absolute', inset: 0, background: BG, opacity: sceneOp }}>
        <div style={{ position: 'absolute', top: 36, left: 0, right: 0, textAlign: 'center', opacity: labelOp,
          fontFamily: MONO, fontSize: 13, color: ACCENT, letterSpacing: 3, textTransform: 'uppercase' }}>◇ Step 2 — Claude builds your graph</div>
        <div style={{ position: 'absolute', top: 76, left: 0, right: 0, textAlign: 'center', opacity: captionOp }}>
          <div style={{ fontFamily: SANS, fontSize: 38, fontWeight: 800, color: '#fff', letterSpacing: '-0.025em' }}>

          </div>
        </div>

        <svg width="1280" height="720" viewBox="0 0 1280 720" style={{ position: 'absolute', inset: 0 }}>
          {edges.map((e, i) => {
            const op = animate({ from: 0, to: 0.3, start: e.delay, end: e.delay + 0.5 })(t);
            const a = drift(nodeMap[e.from]); const b = drift(nodeMap[e.to]);
            const isOrg = nodeMap[e.from].type === 'org' || nodeMap[e.to].type === 'org';
            return <line key={i} x1={a.cx} y1={a.cy} x2={b.cx} y2={b.cy}
              stroke={isOrg ? 'rgba(255,255,255,0.15)' : ACCENT} strokeWidth={isOrg ? 0.8 : 1.2} opacity={op} />;
          })}
          {nodes.map(n => {
            const delay = n.delay || 0;
            const op = fadeIn(t, delay, 0.4);
            const sc = pop(t, delay, 0.5);
            const p = drift(n);
            return (
              <g key={n.id} opacity={op} transform={`translate(${p.cx},${p.cy}) scale(${n.id === 'you' ? sc * youPulse : sc})`}>
                {n.type === 'org' ? <rect x={-n.r} y={-n.r} width={n.r*2} height={n.r*2} rx={3} fill={n.color} opacity={0.85} />
                  : n.type === 'event' ? <polygon points={`0,${-n.r} ${n.r},0 0,${n.r} ${-n.r},0`} fill={n.color} opacity={0.6} />
                  : n.type === 'topic' ? <circle r={n.r} fill="none" stroke={n.color} strokeWidth="1.5" opacity={0.7} />
                  : n.type === 'self' ? <circle r={n.r} fill={ACCENT} />

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Default off — browsers block audio until user gesture anyway, and surprise audio is rude.
  const [audioOn, setAudioOn] = React.useState(false);

  const toggleAudio = React.useCallback(() => {
    setAudioOn(prev => {
      const next = !prev;
      if (next) {
        Audio.unlock();
        Audio.setMuted(false);
      } else {
        Audio.setMuted(true);
        Audio.cancelSpeech();
        Audio.stopDrone();
      }
      return next;
    });
  }, []);

  return (
    <>
      <Stage width={1280} height={720} duration={50} background={BG} autoplay={true} loop={true} persistKey="wingmic-video-v6">
        <Video tweaks={t} />
        <SoundtrackPlayer enabled={audioOn} />
      </Stage>
      <AudioToggle on={audioOn} onToggle={toggleAudio} />
      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakColor label="Primary accent" value={t.accentColor} onChange={(v) => setTweak('accentColor', v)} />
        <TweakColor label="Secondary"      value={t.secondColor} onChange={(v) => setTweak('secondColor', v)} />
        <TweakColor label="Tertiary"       value={t.thirdColor}  onChange={(v) => setTweak('thirdColor', v)} />
        <TweakColor label="Forget red"     value={t.redColor}    onChange={(v) => setTweak('redColor', v)} />
        <TweakSection label="Copy" />
        <TweakText  label="Opening tagline" value={t.openingTagline} onChange={(v) => setTweak('openingTagline', v)} />
        <TweakText  label="End headline"    value={t.endHeadline}    onChange={(v) => setTweak('endHeadline', v)} />
        <TweakText  label="End italic"      value={t.endItalic}      onChange={(v) => setTweak('endItalic', v)} />
        <TweakText  label="CTA button"      value={t.ctaText}        onChange={(v) => setTweak('ctaText', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
