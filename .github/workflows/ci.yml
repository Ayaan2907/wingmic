name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build · vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run --filter '@wingmic/web' lint && bun run --filter '@wingmic/app' lint

      - name: vitest
        working-directory: apps/app
        run: bun run test

      - name: build (web — static export)
        working-directory: apps/web
        run: bun run build

      - name: build (app — dynamic)
        working-directory: apps/app
        run: bun run build
