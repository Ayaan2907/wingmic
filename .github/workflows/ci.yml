name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build · vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

      - name: build
        run: bun run build

      - name: verify landing has no auth/db leak
        run: |
          LEAKS=$(grep -rE "betterAuth|libsql|drizzle|@trpc" apps/web/out/_next/static/chunks/*.js 2>/dev/null | wc -l | tr -d ' ')
          if [ "$LEAKS" -ne "0" ]; then
            echo "ERROR: $LEAKS auth/db references found in apps/web/out — landing must be static"
            exit 1
          fi
