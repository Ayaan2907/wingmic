name: Bug report
description: Report something broken in wingmic
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please give us enough to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I tap the mic and say "...", the transcript shows "..." instead of "...".
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Smallest possible reproduction.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Speak "..."
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Wingmic version / commit
      placeholder: v0.1.0-beta or commit sha
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser + OS
      placeholder: Chrome 132 on macOS 15
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      render: shell
